<!DOCTYPE html> 
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sumo Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e12;
    --card: #18181f;
    --card2: #1f1f28;
    --border: #2a2a36;
    --text: #e8e8f0;
    --muted: #7a7a96;
    --blue: #3d8ef0;
    --blue-soft: #1a2e4a;
    --pink: #e0558a;
    --pink-soft: #3a1828;
    --accent: #f5c842;
    --radius: 14px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: rgba(14,14,18,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 100;
  }

  #back-btn {
    display: none;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--card2);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #back-btn.visible { display: flex; }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--accent);
    flex: 1;
  }

  /* ── SCREENS ── */
  .screens { margin-top: var(--header-h); }

  .screen {
    display: none;
    min-height: calc(100dvh - var(--header-h));
    padding: 16px;
    animation: fadeIn .22s ease;
  }
  .screen.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── LOADING ── */
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 0;
  }

  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text { color: var(--muted); font-size: 14px; }

  /* ── ERROR / EMPTY ── */
  .error-box, .empty-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    margin-top: 24px;
  }
  .error-box { border-color: #7a2020; }
  .error-box .ico { font-size: 36px; margin-bottom: 10px; }
  .error-box p { color: #e07070; font-size: 14px; line-height: 1.6; }
  .empty-box .ico { font-size: 36px; margin-bottom: 10px; }
  .empty-box p { color: var(--muted); font-size: 14px; }

  /* ── SCREEN LABEL ── */
  .screen-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── CARDS ── */
  .card-list { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    active-state: none;
  }
  .card:active { transform: scale(.98); background: var(--card2); }

  .card-title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── GENDER TABS ── */
  .gender-section { margin-bottom: 24px; }

  .gender-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius) var(--radius) 0 0;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .5px;
  }
  .gender-header.male {
    background: var(--blue-soft);
    color: var(--blue);
    border: 1px solid rgba(61,142,240,.25);
    border-bottom: none;
  }
  .gender-header.female {
    background: var(--pink-soft);
    color: var(--pink);
    border: 1px solid rgba(224,85,138,.25);
    border-bottom: none;
  }

  .gender-cards {
    border: 1px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .gender-cards .card {
    border-radius: 0;
    border: none;
    border-bottom: 1px solid var(--border);
  }
  .gender-cards .card:last-child { border-bottom: none; }

  .gender-cards.male .card:active { background: var(--blue-soft); }
  .gender-cards.female .card:active { background: var(--pink-soft); }

  .cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .cat-badge.male { background: var(--blue-soft); color: var(--blue); }
  .cat-badge.female { background: var(--pink-soft); color: var(--pink); }

  /* ── ACTION BUTTONS (screen 3) ── */
  .action-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 8px;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    transition: background .15s, border-color .15s, transform .1s;
  }
  .action-btn:active { transform: scale(.97); }
  .action-btn .ico { font-size: 28px; }

  .action-btn.athletes { border-color: rgba(61,142,240,.35); }
  .action-btn.athletes:active { background: var(--blue-soft); }
  .action-btn.fights { border-color: rgba(245,200,66,.25); }
  .action-btn.fights:active { background: #2a240a; }

  .action-sub { font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  /* ── ATHLETES TABLE ── */
  .table-wrap { overflow-x: auto; margin-top: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--card2);
    color: var(--muted);
    text-align: left;
    padding: 10px 10px;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: .5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: rgba(255,255,255,.015); }

  .place-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    font-weight: 700;
    font-size: 12px;
  }
  .place-1 { background: #f5c842; color: #0e0e12; }
  .place-2 { background: #aab4bf; color: #0e0e12; }
  .place-3 { background: #c87941; color: #0e0e12; }
  .place-other { background: var(--card2); color: var(--muted); }

  /* ── FIGHTS ── */
  .fight-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }

  .fight-meta {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
  }

  .fighters {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }

  .fighter { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .fighter.left { text-align: left; }
  .fighter.right { text-align: right; }

  .vs-badge {
    background: var(--card2);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
  }

  .winner-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 4px;
    background: rgba(245,200,66,.1);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .fight-club { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .breadcrumb span { color: var(--text); font-weight: 600; }

  /* ── COMP BADGE ── */
  .comp-date {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    background: rgba(245,200,66,.08);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
    margin-top: 6px;
    font-weight: 600;
  }

  /* ── RETRY BTN ── */
  .retry-btn {
    margin-top: 14px;
    padding: 10px 22px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--card2);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <button id="back-btn" aria-label="Назад">←</button>
  <div class="header-title" id="header-title">🥋 SUMO SPORT</div>
</header>

<div class="screens">

  <!-- SCREEN 1: Tournaments -->
  <div class="screen active" id="s1">
    <div class="screen-label">Турниры</div>
    <div id="s1-content"><div class="loader-wrap"><div class="spinner"></div><div class="loader-text">Загрузка турниров…</div></div></div>
  </div>

  <!-- SCREEN 2: Categories -->
  <div class="screen" id="s2">
    <div id="s2-breadcrumb" class="breadcrumb"></div>
    <div class="screen-label">Категории</div>
    <div id="s2-content"><div class="loader-wrap"><div class="spinner"></div></div></div>
  </div>

  <!-- SCREEN 3: Choose view -->
  <div class="screen" id="s3">
    <div id="s3-breadcrumb" class="breadcrumb"></div>
    <div class="screen-label">Что смотрим?</div>
    <div class="action-grid">
      <button class="action-btn athletes" onclick="goAthletes()">
        <span class="ico">👥</span>
        <div>
          <div>Списки участников</div>
          <div class="action-sub">Все спортсмены категории</div>
        </div>
      </button>
      <button class="action-btn fights" onclick="goFights()">
        <span class="ico">⚔️</span>
        <div>
          <div>Ход встреч</div>
          <div class="action-sub">Результаты поединков</div>
        </div>
      </button>
    </div>
  </div>

  <!-- SCREEN 4: Athletes -->
  <div class="screen" id="s4">
    <div id="s4-breadcrumb" class="breadcrumb"></div>
    <div class="screen-label">Участники</div>
    <div id="s4-content"><div class="loader-wrap"><div class="spinner"></div></div></div>
  </div>

  <!-- SCREEN 5: Fights -->
  <div class="screen" id="s5">
    <div id="s5-breadcrumb" class="breadcrumb"></div>
    <div class="screen-label">Ход встреч</div>
    <div id="s5-content"><div class="loader-wrap"><div class="spinner"></div></div></div>
  </div>

</div>

<script>
// ── STATE ──
const state = {
  history: [],          // screen stack
  compId: null,
  compName: null,
  catId: null,
  catName: null,
  catGender: null,
};

const API = '';

// ── NAVIGATION ──
function setTitle(t) { document.getElementById('header-title').textContent = t; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  const btn = document.getElementById('back-btn');
  if (state.history.length > 0) btn.classList.add('visible');
  else btn.classList.remove('visible');
}

function navigate(screenId, titleText) {
  state.history.push(document.querySelector('.screen.active').id);
  setTitle(titleText || '🥋 SUMO SPORT');
  showScreen(screenId);
}

document.getElementById('back-btn').onclick = () => {
  if (!state.history.length) return;
  const prev = state.history.pop();
  if (state.history.length === 0) {
    document.getElementById('back-btn').classList.remove('visible');
    setTitle('🥋 SUMO SPORT');
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(prev).classList.add('active');

  // restore title from screen
  const titles = { s1: '🥋 SUMO SPORT', s2: state.compName || 'Категории', s3: state.catName || 'Раздел' };
  if (titles[prev]) setTitle(titles[prev]);
};

// ── API FETCH ──
async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function errBox(msg) {
  return `<div class="error-box"><div class="ico">⚠️</div><p>${msg}</p></div>`;
}
function emptyBox(msg) {
  return `<div class="empty-box"><div class="ico">🔍</div><p>${msg}</p></div>`;
}

// ── GENDER DETECTION ──
function detectGender(cat) {
  if (cat.sex !== undefined && cat.sex !== null) {
    const s = String(cat.sex).toLowerCase();
    if (s === 'f' || s === 'ж' || s === 'female' || s === '2') return 'female';
    if (s === 'm' || s === 'м' || s === 'male' || s === '1') return 'male';
  }
  // detect by name
  const name = (cat.name || cat.title || '').toLowerCase();
  if (name.includes('жен') || name.includes('дев') || name.includes('women') || name.includes('girl')) return 'female';
  if (name.includes('муж') || name.includes('мал') || name.includes('men') || name.includes('boy')) return 'male';
  // detect by weight
  const match = (cat.name || cat.title || '').match(/\d+/);
  if (match) {
    const w = parseInt(match[0]);
    if (w >= 45 && w <= 75) return 'female';
    if (w >= 50 && w <= 130) return 'male';
  }
  return 'unknown';
}

// ── SCREEN 1: Tournaments ──
async function loadTournaments() {
  const el = document.getElementById('s1-content');
  el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div><div class="loader-text">Загрузка турниров…</div></div>';
  try {
    const data = await apiFetch('/api/competitions/');
    const list = Array.isArray(data) ? data : (data.results || data.data || []);
    if (!list.length) { el.innerHTML = emptyBox('Турниры не найдены'); return; }
    el.innerHTML = '<div class="card-list">' + list.map(c => {
      const name = c.name || c.title || `Турнир #${c.id}`;
      const date = c.date_start || c.date || '';
      const loc = c.location || c.city || '';
      return `<div class="card" onclick="openTournament(${c.id}, ${JSON.stringify(name).replace(/'/g,"\\'")})">`
        + `<div class="card-title">${escHtml(name)}</div>`
        + (loc ? `<div class="card-meta">📍 ${escHtml(loc)}</div>` : '')
        + (date ? `<div class="comp-date">📅 ${escHtml(date)}</div>` : '')
        + `</div>`;
    }).join('') + '</div>';
  } catch(e) {
    el.innerHTML = errBox('Не удалось загрузить турниры.<br>Проверьте соединение и попробуйте снова.');
  }
}

function openTournament(id, name) {
  state.compId = id;
  state.compName = name;
  navigate('s2', name);
  loadCategories(id);
}

// ── SCREEN 2: Categories ──
async function loadCategories(compId) {
  const el = document.getElementById('s2-content');
  const bc = document.getElementById('s2-breadcrumb');
  bc.innerHTML = `🏆 <span>${escHtml(state.compName)}</span>`;
  el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div></div>';
  try {
    const data = await apiFetch(`/api/competitions/${compId}/`);
    // categories may be in different fields
    const cats = data.categories || data.category_set || data.groups || [];
    if (!cats.length) { el.innerHTML = emptyBox('Категории не найдены'); return; }

    const males = [], females = [], unknowns = [];
    cats.forEach(c => {
      const g = detectGender(c);
      if (g === 'male') males.push(c);
      else if (g === 'female') females.push(c);
      else unknowns.push(c);
    });

    let html = '';
    if (males.length) html += renderGenderSection(males, 'male', '♂ Мужчины');
    if (females.length) html += renderGenderSection(females, 'female', '♀ Женщины');
    if (unknowns.length) html += renderGenderSection(unknowns, 'unknown', '• Категории');

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = errBox('Не удалось загрузить категории.<br>' + e.message);
  }
}

function renderGenderSection(cats, gender, label) {
  const headerClass = gender === 'male' ? 'male' : gender === 'female' ? 'female' : '';
  const cardsClass = gender === 'male' ? 'male' : gender === 'female' ? 'female' : '';
  let html = `<div class="gender-section">`;
  if (headerClass) html += `<div class="gender-header ${headerClass}">${label}</div>`;
  html += `<div class="gender-cards ${cardsClass}">`;
  cats.forEach(c => {
    const name = c.name || c.title || `Категория #${c.id}`;
    const wt = c.weight_category || c.weight || '';
    html += `<div class="card" onclick="openCategory(${c.id}, ${JSON.stringify(name)}, '${gender}')">`;
    html += `<div class="card-title">${escHtml(name)}</div>`;
    if (wt) html += `<div class="cat-badge ${gender === 'male' ? 'male' : 'female'}">⚖️ ${escHtml(String(wt))}</div>`;
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function openCategory(id, name, gender) {
  state.catId = id;
  state.catName = name;
  state.catGender = gender;
  navigate('s3', name);
  const bc = document.getElementById('s3-breadcrumb');
  bc.innerHTML = `🏆 <span>${escHtml(state.compName)}</span> › ${escHtml(name)}`;
}

// ── SCREEN 3 actions ──
function goAthletes() {
  navigate('s4', 'Участники');
  loadAthletes();
}
function goFights() {
  navigate('s5', 'Ход встреч');
  loadFights();
}

// ── SCREEN 4: Athletes ──
async function loadAthletes() {
  const el = document.getElementById('s4-content');
  const bc = document.getElementById('s4-breadcrumb');
  bc.innerHTML = `🏆 <span>${escHtml(state.compName)}</span> › ${escHtml(state.catName)}`;
  el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div></div>';
  try {
    const data = await apiFetch(`/api/competitions/${state.compId}/categories/${state.catId}/athletes`);
    const list = Array.isArray(data) ? data : (data.results || data.athletes || []);
    if (!list.length) { el.innerHTML = emptyBox('Участники не найдены'); return; }

    let html = '<div class="table-wrap"><table><thead><tr>'
      + '<th>#</th><th>Спортсмен</th><th>Регион / Клуб</th><th>Вес</th>'
      + '</tr></thead><tbody>';

    list.forEach((a, i) => {
      const place = a.place || (i + 1);
      const pClass = place == 1 ? 'place-1' : place == 2 ? 'place-2' : place == 3 ? 'place-3' : 'place-other';
      const name = [a.last_name, a.first_name, a.middle_name].filter(Boolean).join(' ') || a.name || `Спортсмен ${i+1}`;
      const region = a.region || a.club || a.organization || '—';
      const weight = a.weight ? a.weight + ' кг' : '—';
      html += `<tr>`
        + `<td><span class="place-badge ${pClass}">${place}</span></td>`
        + `<td>${escHtml(name)}</td>`
        + `<td style="color:var(--muted);font-size:12px">${escHtml(String(region))}</td>`
        + `<td style="color:var(--muted)">${escHtml(String(weight))}</td>`
        + `</tr>`;
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = errBox('Не удалось загрузить участников.<br>' + e.message);
  }
}

// ── SCREEN 5: Fights ──
async function loadFights() {
  const el = document.getElementById('s5-content');
  const bc = document.getElementById('s5-breadcrumb');
  bc.innerHTML = `🏆 <span>${escHtml(state.compName)}</span> › ${escHtml(state.catName)}`;
  el.innerHTML = '<div class="loader-wrap"><div class="spinner"></div></div>';
  try {
    const data = await apiFetch(`/api/competitions/${state.compId}/categories/${state.catId}/hod`);
    const list = Array.isArray(data) ? data : (data.results || data.fights || data.hod || []);
    if (!list.length) { el.innerHTML = emptyBox('Встречи не найдены или ещё не начались'); return; }

    let html = '';
    list.forEach((f, i) => {
      const round = f.round || f.stage || f.tur || '';
      const num = f.number || f.num || (i + 1);
      const a1 = fightName(f, 'athlete1', 'athlete_1', 'sportsman1', 'red');
      const a2 = fightName(f, 'athlete2', 'athlete_2', 'sportsman2', 'blue');
      const winner = f.winner || f.winner_id || null;
      const score = f.score || f.result || '';

      const a1Win = winner && (winner == (f.athlete1?.id || f.athlete_1?.id || f.red?.id));
      const a2Win = winner && !a1Win && winner != null;

      html += `<div class="fight-card">`;
      if (round || num) {
        html += `<div class="fight-meta">`;
        if (round) html += `<span>🏁 ${escHtml(String(round))}</span>`;
        html += `<span>Бой #${num}</span>`;
        if (score) html += `<span>${escHtml(String(score))}</span>`;
        html += `</div>`;
      }
      html += `<div class="fighters">`;
      html += `<div class="fighter left">${escHtml(a1.name)}<div class="fight-club">${escHtml(a1.club)}</div>${a1Win ? '<div class="winner-tag">🏆 Победитель</div>' : ''}</div>`;
      html += `<div class="vs-badge">VS</div>`;
      html += `<div class="fighter right">${escHtml(a2.name)}<div class="fight-club">${escHtml(a2.club)}</div>${a2Win ? '<div class="winner-tag">🏆 Победитель</div>' : ''}</div>`;
      html += `</div></div>`;
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = errBox('Не удалось загрузить встречи.<br>' + e.message);
  }
}

function fightName(f, ...keys) {
  for (const k of keys) {
    const obj = f[k];
    if (obj) {
      const name = [obj.last_name, obj.first_name].filter(Boolean).join(' ') || obj.name || '—';
      const club = obj.region || obj.club || obj.organization || '';
      return { name, club };
    }
  }
  return { name: '—', club: '' };
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

if (window.Telegram?.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
}

loadTournaments();
